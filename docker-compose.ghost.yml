version: '3.8'

services:
  ghost:
    image: ghost:5-alpine
    restart: always
    ports:
      - "2368:2368"
    environment:
      url: ${GHOST_URL:-http://localhost:2368}
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ghost
      # Mailgun SMTP for transactional emails
      mail__transport: SMTP
      mail__options__service: Mailgun
      mail__options__host: smtp.mailgun.org
      mail__options__port: 587
      mail__options__secure: "false"
      mail__options__auth__user: ${GHOST_MAILGUN_USER}
      mail__options__auth__pass: ${GHOST_MAILGUN_PASSWORD}
      mail__from: "'Taiwan Digital Fest Blog' <blog@${MAILGUN_DOMAIN}>"
      # Mailgun bulk email for Ghost newsletter
      bulk_email__provider: mailgun
      bulk_email__mailgun__apiKey: ${GHOST_MAILGUN_API_KEY}
      bulk_email__mailgun__domain: ${MAILGUN_DOMAIN}
      bulk_email__mailgun__baseUrl: https://api.mailgun.net/v3
    volumes:
      - ghost-content:/var/lib/ghost/content
    depends_on:
      - ghost-db

  ghost-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${GHOST_DB_ROOT_PASSWORD}
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${GHOST_DB_PASSWORD}
      MYSQL_DATABASE: ghost
    volumes:
      - ghost-db-data:/var/lib/mysql

volumes:
  ghost-content:
  ghost-db-data:
